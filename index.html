<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 8px;
      color: #4ade80;
      text-shadow: 0 0 20px #4ade8088;
      margin-bottom: 16px;
    }

    #scoreboard {
      display: flex;
      gap: 48px;
      margin-bottom: 20px;
      font-size: 1rem;
      letter-spacing: 2px;
    }

    .score-label {
      color: #888;
      text-transform: uppercase;
    }

    .score-value {
      color: #4ade80;
      font-size: 1.4rem;
      font-weight: bold;
    }

    #canvas-wrapper {
      position: relative;
    }

    canvas {
      display: block;
      border: 2px solid #4ade8055;
      border-radius: 4px;
      box-shadow: 0 0 40px #4ade8022, 0 0 80px #1a1a2e;
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: #1a1a2ecc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      gap: 16px;
    }

    #overlay h2 {
      font-size: 2rem;
      color: #f87171;
      letter-spacing: 4px;
      text-shadow: 0 0 16px #f8717188;
    }

    #overlay p {
      color: #aaa;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    #overlay.hidden {
      display: none;
    }

    #start-msg {
      position: absolute;
      inset: 0;
      background: #1a1a2ecc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      gap: 16px;
    }

    #start-msg h2 {
      font-size: 2rem;
      color: #4ade80;
      letter-spacing: 4px;
      text-shadow: 0 0 16px #4ade8088;
    }

    #start-msg p {
      color: #aaa;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    #start-msg.hidden {
      display: none;
    }

    button {
      margin-top: 8px;
      padding: 10px 32px;
      background: transparent;
      border: 2px solid #4ade80;
      color: #4ade80;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    button:hover {
      background: #4ade80;
      color: #1a1a2e;
      box-shadow: 0 0 16px #4ade8088;
    }

    #controls {
      margin-top: 20px;
      text-align: center;
      color: #555;
      font-size: 0.8rem;
      letter-spacing: 1px;
      line-height: 2;
    }

    #speed-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
    }

    #speed-selector span {
      color: #888;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    .speed-btn {
      padding: 4px 14px;
      font-size: 0.8rem;
      letter-spacing: 2px;
      border-color: #555;
      color: #888;
      margin-top: 0;
    }

    .speed-btn.active {
      border-color: #4ade80;
      color: #4ade80;
      box-shadow: 0 0 8px #4ade8044;
    }

    .speed-btn:hover {
      background: #4ade80;
      color: #1a1a2e;
    }
  </style>
</head>
<body>

  <h1>SNAKE</h1>

  <div id="scoreboard">
    <div>
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div>
      <div class="score-label">Best</div>
      <div class="score-value" id="best">0</div>
    </div>
    <div>
      <div class="score-label">Level</div>
      <div class="score-value" id="level">1</div>
    </div>
  </div>

  <div id="speed-selector">
    <span>Speed:</span>
    <button class="speed-btn active" data-speed="normal">Normal</button>
    <button class="speed-btn" data-speed="fast">Fast</button>
    <button class="speed-btn" data-speed="insane">Insane</button>
  </div>

  <div id="canvas-wrapper">
    <canvas id="canvas" width="400" height="400"></canvas>

    <div id="start-msg">
      <h2>SNAKE</h2>
      <p>Use arrow keys or WASD to move</p>
      <button id="start-btn">START</button>
    </div>

    <div id="overlay" class="hidden">
      <h2>GAME OVER</h2>
      <p id="final-score"></p>
      <button id="restart-btn">PLAY AGAIN</button>
    </div>
  </div>

  <div id="controls">
    Arrow keys / WASD &mdash; Move &nbsp;|&nbsp; P &mdash; Pause
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const COLS = 20;
    const ROWS = 20;
    const CELL = canvas.width / COLS;

    const SPEEDS = { normal: 140, fast: 80, insane: 45 };
    let currentSpeed = SPEEDS.normal;

    let snake, dir, nextDir, food, score, best, level, gameLoop, paused, running;

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    document.getElementById('best').textContent = best;

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      level = 1;
      paused = false;
      running = true;
      placeFood();
      updateUI();
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function update() {
      if (!running || paused) return;

      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return gameOver();
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return gameOver();
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10 * level;
        if (score >= level * 100) {
          level++;
          clearInterval(gameLoop);
          gameLoop = setInterval(tick, Math.max(40, currentSpeed - (level - 1) * 10));
        }
        placeFood();
        updateUI();
      } else {
        snake.pop();
      }
    }

    function draw() {
      // Background
      ctx.fillStyle = '#0f0f1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = '#ffffff08';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL, 0);
        ctx.lineTo(x * CELL, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL);
        ctx.lineTo(canvas.width, y * CELL);
        ctx.stroke();
      }

      // Food
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      const pulse = 0.85 + 0.15 * Math.sin(Date.now() / 200);
      ctx.save();
      ctx.shadowColor = '#f87171';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc(fx, fy, (CELL / 2 - 3) * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Snake
      snake.forEach((seg, i) => {
        const x = seg.x * CELL;
        const y = seg.y * CELL;
        const pad = 1.5;

        if (i === 0) {
          // Head
          ctx.save();
          ctx.shadowColor = '#4ade80';
          ctx.shadowBlur = 16;
          ctx.fillStyle = '#4ade80';
          roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, 4);
          ctx.fill();
          ctx.restore();

          // Eyes
          ctx.fillStyle = '#1a1a2e';
          const eyeSize = 2.5;
          const eyeOffset = 4;
          let ex1, ey1, ex2, ey2;
          if (dir.x === 1) {
            ex1 = x + CELL - eyeOffset; ey1 = y + eyeOffset;
            ex2 = x + CELL - eyeOffset; ey2 = y + CELL - eyeOffset;
          } else if (dir.x === -1) {
            ex1 = x + eyeOffset; ey1 = y + eyeOffset;
            ex2 = x + eyeOffset; ey2 = y + CELL - eyeOffset;
          } else if (dir.y === -1) {
            ex1 = x + eyeOffset; ey1 = y + eyeOffset;
            ex2 = x + CELL - eyeOffset; ey2 = y + eyeOffset;
          } else {
            ex1 = x + eyeOffset; ey1 = y + CELL - eyeOffset;
            ex2 = x + CELL - eyeOffset; ey2 = y + CELL - eyeOffset;
          }
          ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2); ctx.fill();
        } else {
          const t = i / snake.length;
          const g = Math.floor(174 - t * 80);
          ctx.fillStyle = `rgb(30, ${g}, 80)`;
          ctx.save();
          ctx.shadowColor = '#4ade8044';
          ctx.shadowBlur = 6;
          roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, 3);
          ctx.fill();
          ctx.restore();
        }
      });

      // Pause overlay
      if (paused) {
        ctx.fillStyle = '#1a1a2ecc';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 28px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
        ctx.font = '14px Courier New';
        ctx.fillStyle = '#888';
        ctx.fillText('Press P to resume', canvas.width / 2, canvas.height / 2 + 36);
      }
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function tick() {
      update();
      draw();
    }

    function startGame() {
      document.getElementById('start-msg').classList.add('hidden');
      document.getElementById('overlay').classList.add('hidden');
      init();
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, currentSpeed);
      // Continuous draw for smooth food pulse
      requestAnimationFrame(function loop() {
        if (paused) draw();
        requestAnimationFrame(loop);
      });
    }

    function gameOver() {
      running = false;
      clearInterval(gameLoop);
      if (score > best) {
        best = score;
        localStorage.setItem('snakeBest', best);
        document.getElementById('best').textContent = best;
      }
      document.getElementById('final-score').textContent = `Score: ${score}  |  Best: ${best}`;
      document.getElementById('overlay').classList.remove('hidden');
    }

    function updateUI() {
      document.getElementById('score').textContent = score;
      document.getElementById('best').textContent = best;
      document.getElementById('level').textContent = level;
    }

    // Controls
    document.addEventListener('keydown', e => {
      const keys = {
        ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
      };
      if (keys[e.key]) {
        const nd = keys[e.key];
        // Prevent reversing
        if (nd.x !== -dir.x || nd.y !== -dir.y) {
          nextDir = nd;
        }
        e.preventDefault();
      }
      if (e.key === 'p' || e.key === 'P') {
        if (running) paused = !paused;
      }
    });

    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', startGame);

    // Speed buttons
    document.querySelectorAll('.speed-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSpeed = SPEEDS[btn.dataset.speed];
      });
    });

    // Initial draw
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  </script>
</body>
</html>
